name: Scan PRs and Issues for Prompt Injection

on:
  pull_request:
    types: [opened, edited, synchronize]
  issues:
    types: [opened, edited]

permissions:
  pull-requests: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for prompt injection
        id: scan
        uses: ./
        with:
          text: ${{ github.event.pull_request.body || github.event.issue.body || '' }}
          threshold: '0.75'
          fail_on_injection: 'false'

      - name: Comment if injection detected
        if: steps.scan.outputs.is_injection == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const type = '${{ steps.scan.outputs.attack_type }}';
            const conf = '${{ steps.scan.outputs.confidence }}';
            const target = context.eventName === 'pull_request' ? 'PR description' : 'issue body';
            const number = context.eventName === 'pull_request'
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: [
                '> ⚠️ **Prompt Injection Warning**',
                '>',
                `> This ${target} was flagged by the [Prompt Injection Firewall](https://github.com/${context.repo.owner}/${context.repo.repo}).`,
                '>',
                `> **Attack type:** \`${type}\` &nbsp; **Confidence:** ${conf}`,
                '>',
                '> If this is a false positive, ignore it. If you run LLM pipelines on PR/issue content, review before processing.',
              ].join('\n')
            });
